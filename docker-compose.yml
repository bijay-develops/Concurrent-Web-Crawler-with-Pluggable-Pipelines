version: '3.9'

services:
  webui:
    build:
      context: ./crawler
      dockerfile: Dockerfile.webui
    environment:
      - WEBUI_PORT=8080
    ports:
      - "8080:8080"

  api:
    build:
      context: ./crawler
      dockerfile: Dockerfile.api
    environment:
      - API_PORT=8090
    ports:
      - "8090:8090"
